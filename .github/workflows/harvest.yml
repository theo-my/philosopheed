name: Daily harvest

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily (afternoon in Hobart)
  workflow_dispatch: {}    # manual trigger from the Actions tab

permissions:
  contents: write

concurrency:
  group: harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Incremental harvest (CrossRef + RSS)
        run: python scripts/harvest.py --update

      - name: Commit updated data
        run: |
          git config user.name "philosopheed-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No new papers today."
          else
            git commit -m "Daily harvest $(date -u +%F)"
            git push
          fi
