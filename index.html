<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Philosopheed — recent publications in philosophy</title>
<meta name="description" content="A dashboard of recent publications in philosophy's top journals, ranked by the de Bruin (2023) meta-ranking and the Leiter 2022 poll.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📜</text></svg>">
<!-- Anti-FOUC: apply the persisted theme (if any) before first paint, so a
     dark-mode visitor never sees a flash of the light palette. Reads the
     SAME localStorage key/shape app.js uses (§8 prefs) — kept intentionally
     tiny/defensive (try/catch, no throw) since it runs before anything else. -->
<script>
(function () {
  try {
    var p = JSON.parse(localStorage.getItem("philosopheed:prefs") || "null");
    if (p && (p.theme === "light" || p.theme === "dark")) {
      document.documentElement.dataset.theme = p.theme;
    }
  } catch (e) { /* corrupt storage — fall through to default/system theme */ }
})();
</script>
<link rel="stylesheet" href="css/style.css">
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.min.js" } }
</script>
</head>
<body>

<header class="site">
  <div class="wrap">
    <div class="site-row">
      <div class="brand">
        <h1>philoso<span class="feed">pheed</span></h1>
        <span class="tag">recent publications in philosophy</span>
      </div>
      <div class="spacer"></div>
      <input class="searchbox" id="search" type="search"
             placeholder="Search titles &amp; authors…" autocomplete="off">
      <button class="iconbtn search-icon-btn" id="btn-search-toggle" title="Search" aria-label="Search" aria-expanded="false">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.6"></circle>
          <line x1="11" y1="11" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></line>
        </svg>
      </button>
      <div class="display-wrap">
        <button class="iconbtn" id="btn-favorites" title="Favourite journals">Favourites</button>
        <div class="popover favorites-popover" id="favorites-popover">
          <div class="popover-head">Favourites <span class="popover-sub">click to add, in order</span></div>
          <div class="fav-list" id="fav-list"></div>
          <div class="fav-reorder-list" id="fav-reorder-list" style="display:none"></div>
          <button class="iconbtn popover-reset" id="fav-clear">Clear favourites</button>
          <button class="iconbtn popover-reset" id="fav-reorder">Re-order favourites</button>
          <button class="iconbtn popover-reset" id="fav-reorder-done" style="display:none">Done</button>
        </div>
      </div>
      <div class="display-wrap">
        <button class="iconbtn" id="btn-display" title="Display settings">Display</button>
        <div class="popover" id="display-popover">
          <label>Zoom <span id="zoom-val">100%</span>
            <input type="range" id="zoom-slider" min="60" max="100" step="5" value="100"></label>
          <label>Card width <span id="cardw-val">420px</span>
            <input type="range" id="cardw-slider" min="160" max="600" step="10" value="420"></label>
          <label>Card height <span id="cardh-val">430px</span>
            <input type="range" id="cardh-slider" min="200" max="900" step="10" value="430"></label>
          <div class="popover-label">Feed width</div>
          <nav class="seg small popover-seg" id="feedwidth-seg" aria-label="Feed width">
            <button data-fw="narrow">Narrow</button>
            <button data-fw="default" class="on">Default</button>
            <button data-fw="wide">Wide</button>
            <button data-fw="max">Max</button>
          </nav>
          <div class="popover-label">Card style</div>
          <nav class="seg small popover-seg" id="cardstyle-seg" aria-label="Card style">
            <button data-cs="book" class="on">Book</button>
            <button data-cs="basic">Basic</button>
          </nav>
          <div class="popover-label">Font</div>
          <nav class="seg small popover-seg" id="font-seg" aria-label="Font">
            <button data-font="sans" class="on">Sans</button>
            <button data-font="serif">Serif</button>
          </nav>
          <div class="popover-label">Details</div>
          <nav class="seg small popover-seg" id="details-seg" aria-label="Details">
            <button data-details="show" class="on">Show authors &amp; dates</button>
            <button data-details="hide">Hide authors &amp; dates</button>
          </nav>
          <button class="iconbtn popover-reset" id="display-reset">Reset</button>
        </div>
      </div>
      <button class="iconbtn" id="btn-3d" title="3D view">3D</button>
      <div class="display-wrap more-wrap">
        <button class="iconbtn" id="btn-more" title="More" aria-label="More" aria-haspopup="true" aria-expanded="false">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <circle cx="3" cy="8" r="1.6"></circle>
            <circle cx="8" cy="8" r="1.6"></circle>
            <circle cx="13" cy="8" r="1.6"></circle>
          </svg>
        </button>
        <div class="popover more-menu" id="more-menu" role="menu">
          <button class="menu-item mobile-only-item" id="menu-favorites" type="button">Favourites</button>
          <button class="menu-item mobile-only-item" id="menu-display" type="button">Display</button>
          <button class="menu-item mobile-only-item" id="menu-3d" type="button">3D view</button>
          <button class="menu-item" id="menu-theme" type="button">Dark mode</button>
          <button class="menu-item" id="menu-about" type="button">About</button>
        </div>
      </div>
    </div>
    <div class="cov-note" id="cov-note"></div>
    <div class="chiprow" id="chiprow">
      <div class="chip-wrap">
        <button class="chip-btn" id="chip-view" type="button" aria-haspopup="true" aria-expanded="false">
          <span class="chip-key">VIEW</span><span class="chip-val">By venue</span><span class="chip-caret" aria-hidden="true">▾</span>
        </button>
        <div class="chip-menu" id="menu-view" role="menu"></div>
      </div>
      <div class="chip-wrap">
        <button class="chip-btn" id="chip-mode" type="button" aria-haspopup="true" aria-expanded="false">
          <span class="chip-key">SUBFIELD</span><span class="chip-val"></span><span class="chip-caret" aria-hidden="true">▾</span>
        </button>
        <div class="chip-menu" id="menu-mode" role="menu"></div>
      </div>
      <div class="chip-wrap">
        <button class="chip-btn" id="chip-rank" type="button" aria-haspopup="true" aria-expanded="false">
          <span class="chip-key">RANKING</span><span class="chip-val"></span><span class="chip-caret" aria-hidden="true">▾</span>
        </button>
        <div class="chip-menu" id="menu-rank" role="menu">
          <div class="chip-menu-caption" id="basis-note"></div>
        </div>
      </div>
      <div class="chip-wrap">
        <button class="chip-btn" id="chip-win" type="button" aria-haspopup="true" aria-expanded="false">
          <span class="chip-key">WINDOW</span><span class="chip-val">12 mo</span><span class="chip-caret" aria-hidden="true">▾</span>
        </button>
        <div class="chip-menu" id="menu-win" role="menu">
          <button class="chip-menu-item" data-preset="7" role="menuitemradio">7 d</button>
          <button class="chip-menu-item" data-preset="30" role="menuitemradio">30 d</button>
          <button class="chip-menu-item" data-preset="90" role="menuitemradio">90 d</button>
          <button class="chip-menu-item on" data-preset="365" role="menuitemradio">12 mo</button>
          <button class="chip-menu-item" data-preset="1826" role="menuitemradio">5 yr</button>
          <button class="chip-menu-item" data-preset="all" role="menuitemradio">Since 2000</button>
          <button class="chip-menu-item" id="win-menu-year-toggle" role="menuitemradio">Pick a year…</button>
          <span class="yearpick" id="yearpick">
            <input type="number" id="yearinput" min="2000" max="2026" step="1" value="2020"
                   inputmode="numeric" aria-label="Year (Enter applies)">
            <button class="iconbtn" id="yearapply" title="Show this year — Enter applies">Go</button>
          </span>
          <button class="chip-menu-item" id="win-menu-custom-toggle" role="menuitemradio">Custom…</button>
          <span class="custompick" id="custompick">
            <input type="number" id="custom-n" min="1" step="1" value="3"
                   inputmode="numeric" aria-label="Custom window amount (Enter applies)">
            <select id="custom-unit" aria-label="Custom window unit">
              <option value="days">days</option>
              <option value="weeks" selected>weeks</option>
              <option value="months">months</option>
              <option value="years">years</option>
            </select>
            <button class="iconbtn" id="custom-apply" title="Show the last X units — Enter applies">Go</button>
          </span>
        </div>
      </div>
      <span class="count-note" id="count-note"></span>
    </div>
  </div>
</header>

<main>
  <div class="wrap" id="content">
    <div class="status">Loading Philosopheed…</div>
  </div>
</main>

<!-- paper detail -->
<div class="overlay" id="paper-overlay">
  <div class="modal" id="paper-modal" role="dialog" aria-modal="true"></div>
</div>

<!-- about -->
<div class="overlay" id="about-overlay">
  <div class="modal about" id="about-modal" role="dialog" aria-modal="true"></div>
</div>

<!-- journal popout -->
<div class="overlay" id="journal-overlay">
  <div class="modal journal-modal" id="journal-modal" role="dialog" aria-modal="true"></div>
</div>

<!-- 3D mode -->
<div id="three-wrap">
  <div id="three-canvas"></div>
  <div class="three-hud">
    <button class="iconbtn" id="btn-exit-3d">← Dashboard</button>
    <nav class="seg small" id="rank-seg-3d"></nav>
    <button class="iconbtn" id="btn-aim" title="Look around by pointing your device instead of dragging">Aim to view</button>
  </div>
  <div class="three-panel" id="three-panel"></div>
  <div class="aim-status" id="aim-status"></div>
  <div class="three-hint" id="three-hint-text">drag to look around · scroll to zoom · click a book to read it · Esc puts it back</div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
